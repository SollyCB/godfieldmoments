<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: black;
}

/* Main shiny text */
.shiny {
  font-size: 60px;
  font-weight: bold;
  font-family: Arial, sans-serif;
  text-align: center;

  background: linear-gradient(
    90deg,
    #222,
    #fff,
    #222
  );

  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 2s linear infinite;
}

/* animation sweep */
@keyframes shine {
  0% {
    background-position: 200%;
  }
  100% {
    background-position: -200%;
  }
}
</style>
</head>

<body>

<center>
<div class="shiny">Godfield Highlights</div>
</center>

</body>
</html>
